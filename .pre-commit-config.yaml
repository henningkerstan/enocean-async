repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format
        files: ^((enocean_async)/.+)?[^/]+\.(py|pyi)$

  - repo: local
    hooks:
      - id: generate-supported-devices
        name: Generate SUPPORTED_DEVICES.md
        entry: python scripts/generate_list_of_devices.py
        language: system
        pass_filenames: false
        files: ^enocean_async/eep/

